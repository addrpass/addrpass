<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Loading state -->
    <div id="loading" class="screen">
      <div class="spinner"></div>
    </div>

    <!-- Login screen -->
    <div id="login-screen" class="screen hidden">
      <div class="header">
        <svg width="24" height="24" viewBox="0 0 1024 1024" fill="none">
          <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#F0EFE8"/>
          <rect x="232" y="232" width="560" height="560" rx="80" fill="none" stroke="#1A1A1A" stroke-width="48"/>
          <circle cx="512" cy="430" r="76" fill="#1A1A1A"/>
          <path d="M472 480L446 668L578 668L552 480Z" fill="#1A1A1A"/>
          <circle cx="512" cy="430" r="28" fill="#E7B300"/>
        </svg>
        <span class="logo-text">AddrPass</span>
      </div>
      <p class="subtitle">Sign in to access your addresses</p>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <div id="login-error" class="error hidden"></div>
        <button type="submit" id="login-btn">Sign in</button>
      </form>
      <a href="https://addrpass.com/register" target="_blank" class="link">Create an account</a>
    </div>

    <!-- Main screen (logged in) -->
    <div id="main-screen" class="screen hidden">
      <div class="header">
        <svg width="20" height="20" viewBox="0 0 1024 1024" fill="none">
          <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#F0EFE8"/>
          <rect x="232" y="232" width="560" height="560" rx="80" fill="none" stroke="#1A1A1A" stroke-width="48"/>
          <circle cx="512" cy="430" r="76" fill="#1A1A1A"/>
          <path d="M472 480L446 668L578 668L552 480Z" fill="#1A1A1A"/>
          <circle cx="512" cy="430" r="28" fill="#E7B300"/>
        </svg>
        <span class="logo-text">AddrPass</span>
        <button id="logout-btn" class="icon-btn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>

      <div id="user-info">
        <span id="user-email"></span>
      </div>

      <div id="addresses-section">
        <div class="section-header">
          <span>Your Addresses</span>
          <button id="refresh-btn" class="icon-btn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div id="address-list"></div>
      </div>

      <a href="https://addrpass.com/dashboard" target="_blank" class="link">Open Dashboard</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
